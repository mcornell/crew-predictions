micronaut:
  application:
    name: predictions
logger:
  levels:
    liquibase: DEBUG
datasources:
  default:
    driver-class-name: org.postgresql.Driver
    db-type: postgres
    dialect: POSTGRES
liquibase:
  datasources:
    default:
      change-log: classpath:db/liquibase-changelog.xml
netty:
  default:
    allocator:
      max-order: 3