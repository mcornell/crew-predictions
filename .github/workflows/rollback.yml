name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "rollback" to confirm'
        required: true

jobs:
  rollback-prod:
    if: github.event.inputs.confirm == 'rollback'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east5-docker.pkg.dev --quiet

      - name: Redeploy prod-previous to Cloud Run
        run: |
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions
          gcloud run deploy crew-predictions \
            --image=${IMAGE}:prod-previous \
            --region=us-east5 \
            --update-secrets=ADMIN_KEY=admin-key:latest,SESSION_SECRET=session-secret:latest \
            --quiet
          echo "Cloud Run redeployed from prod-previous image"

      - name: Redeploy prod-previous to Firebase Hosting
        run: |
          if gcloud storage ls gs://crew-predictions-frontend/prod-previous.zip 2>/dev/null; then
            gcloud storage cp gs://crew-predictions-frontend/prod-previous.zip rollback.zip
            unzip -q rollback.zip -d dist/
            npx firebase deploy --only hosting --project crew-predictions
            echo "Firebase Hosting redeployed from prod-previous.zip"
          else
            echo "::warning::No prod-previous.zip found — Firebase Hosting not rolled back (no prior prod deploy exists)"
          fi

      - name: Swap prod and prod-previous tags
        run: |
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions
          gcloud artifacts docker tags add ${IMAGE}:prod-previous ${IMAGE}:prod --quiet
          if gcloud storage ls gs://crew-predictions-frontend/prod-previous.zip 2>/dev/null; then
            gcloud storage cp gs://crew-predictions-frontend/prod-previous.zip \
              gs://crew-predictions-frontend/prod.zip
          fi
          echo "Tags swapped — prod now points to what was prod-previous"
