name: CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/develop' }}

jobs:
  build-and-test:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    # Run inside the Microsoft Playwright container so chromium + every
    # system lib is preinstalled. Eliminates `npx playwright install
    # --with-deps` (~30-90s per CI run). Image tag MUST match the
    # @playwright/test version pinned in package.json — bump both
    # together when upgrading Playwright.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    env:
      # Belt-and-suspenders alongside the 127.0.0.1 emulator hosts below.
      # Inside the playwright container /etc/hosts resolves "localhost" to
      # ::1 first, but the Firebase Auth emulator binds 127.0.0.1 only —
      # any code path still using "localhost" would hit ECONNREFUSED ::1.
      # This restores Node 16 default IPv4-first ordering as a safety net.
      NODE_OPTIONS: --dns-result-order=ipv4first
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      # Firebase Auth emulator requires Java 25 (latest LTS)
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      # Cache Firebase emulator binaries (Firestore jar is ~100MB)
      - uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - run: npm ci
      - run: go mod download

      - name: Go unit tests
        run: |
          echo "## Go Tests" >> $GITHUB_STEP_SUMMARY
          go tool gotestsum --junitfile-testcase-classname=relative --junitfile go-results.xml -- -coverprofile=go-coverage.out $(go list ./... | grep -v '/node_modules/')

      - name: Go test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Go Tests
          path: go-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: Vue unit tests
        run: npm run test:unit -- --coverage

      - name: Vue test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Vue Tests
          path: vitest-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: Coverage summary
        if: always()
        run: |
          go tool gocover-cobertura < go-coverage.out > go-coverage.xml
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os

          def coverage_table(path, strip_prefix=''):
              root = ET.parse(path).getroot()
              total = float(root.get('line-rate', 0)) * 100
              rows = []
              for p in root.iter('package'):
                  name = (p.get('name', '') or 'src').replace(strip_prefix, '')
                  rate = float(p.get('line-rate', 0)) * 100
                  icon = '✅' if rate >= 80 else '⚠️' if rate >= 50 else '❌'
                  rows.append(f'| `{name}` | {icon} {rate:.1f}% |')
              return total, rows

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              for label, path, prefix in [
                  ('Go',  'go-coverage.xml',                  'github.com/mcornell/crew-predictions/'),
                  ('Vue', 'coverage/cobertura-coverage.xml',  ''),
              ]:
                  try:
                      total, rows = coverage_table(path, prefix)
                      f.write(f'\n## {label} Coverage: {total:.1f}%\n\n| Package | Line Rate |\n|---|---|\n')
                      f.write('\n'.join(sorted(rows)) + '\n')
                  except Exception as e:
                      f.write(f'\n## {label} Coverage: error ({e})\n')
          EOF

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Build Go server binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o server ./cmd/server

      - name: Start Firebase emulators
        run: |
          nohup npx firebase emulators:start --only auth,firestore --project crew-predictions \
            > /tmp/emulators.log 2>&1 &
          echo $! > /tmp/emulators.pid
        env:
          FIREBASE_PROJECT_ID: crew-predictions

      - name: Wait for Firebase emulators
        run: |
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:9099; do sleep 1; done'
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:8081; do sleep 1; done'

      - name: Firestore rules unit tests
        run: |
          echo "## Firestore Rules" >> $GITHUB_STEP_SUMMARY
          npm run test:rules
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8081

      - name: Go integration tests
        run: |
          echo "## Go Integration Tests" >> $GITHUB_STEP_SUMMARY
          go tool gotestsum --junitfile-testcase-classname=relative --junitfile go-integration-results.xml -- -tags integration ./internal/repository/...
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8081
          FIREBASE_PROJECT_ID: crew-predictions

      - name: Go integration test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Go Integration Tests
          path: go-integration-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: E2e tests
        run: |
          echo "## Playwright E2E" >> $GITHUB_STEP_SUMMARY
          npm test
        env:
          FIREBASE_PROJECT_ID: crew-predictions
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

      - name: Playwright test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Playwright E2E Tests
          path: playwright-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: Capture emulator diagnostics
        if: always()
        run: |
          echo "=== emulator process status ==="
          ps -p "$(cat /tmp/emulators.pid 2>/dev/null)" -o pid,stat,etime,cmd 2>/dev/null || echo "parent dead"
          echo "=== port listeners (9099 / 8081) ==="
          ss -ltnp 2>/dev/null | grep -E ':(9099|8081)' || echo "no listeners"
          echo "=== dmesg tail (OOM?) ==="
          dmesg 2>/dev/null | tail -50 || echo "dmesg unavailable"
          echo "=== emulator log ==="
          cat /tmp/emulators.log 2>/dev/null || echo "no log file"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 3

      - name: Upload emulator log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emulator-log
          path: /tmp/emulators.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

      - name: Upload server binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-binary
          path: server
          retention-days: 1
          if-no-files-found: error

  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - run: npm ci

      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: dist/

      - name: Download server binary artifact
        uses: actions/download-artifact@v7
        with:
          name: server-binary
          path: .

      - name: Make server binary executable
        run: chmod +x server

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: us-east5-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ github.sha }}
            us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging Cloud Run
        run: |
          gcloud run deploy crew-predictions-staging \
            --image=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ github.sha }} \
            --project=crew-predictions-staging \
            --region=us-east5 \
            --allow-unauthenticated \
            --concurrency=80 \
            --cpu=1 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=20 \
            --timeout=300 \
            --cpu-boost \
            --set-env-vars=FIREBASE_PROJECT_ID=crew-predictions-staging,FIREBASE_API_KEY=$STAGING_API_KEY,FIREBASE_AUTH_DOMAIN=crew-predictions-staging.web.app,GOOGLE_CLOUD_PROJECT=crew-predictions-staging,FIREBASE_MEASUREMENT_ID=G-7N1MBBZ18B,FIREBASE_APP_ID=1:99152086201:web:3ea10e771e33452cecc768,CLOUD_TASKS_PROJECT=crew-predictions-staging,CLOUD_TASKS_LOCATION=us-east4,CLOUD_TASKS_QUEUE=match-polling,CLOUD_TASKS_TARGET_URL=https://crew-predictions-staging-wnzfln25pq-ul.a.run.app/admin/poll-scores \
            --update-secrets=ADMIN_KEY=admin-key:latest,SESSION_SECRET=session-secret:latest \
            --quiet
        env:
          STAGING_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}

      - name: Deploy staging to Firebase Hosting
        run: npx firebase deploy --only hosting --project crew-predictions-staging --config firebase.staging.json

      - name: Deploy Firestore rules + indexes to staging
        run: npx firebase deploy --only firestore --project crew-predictions-staging --config firebase.staging.json

      - name: Upload frontend to GCS
        run: |
          cd dist && zip -r ../frontend.zip .
          gcloud storage cp ../frontend.zip gs://crew-predictions-frontend/sha-${{ github.sha }}.zip
          gcloud storage cp ../frontend.zip gs://crew-predictions-frontend/latest.zip
          echo "Uploaded sha-${{ github.sha }}.zip and latest.zip to GCS"

  smoke-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: deploy-staging
    runs-on: ubuntu-latest
    # Same container approach as build-and-test — chromium + system libs
    # preinstalled. Image tag must match @playwright/test in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    permissions:
      checks: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - run: npm ci

      - name: Run staging smoke tests
        run: npm run test:smoke
        env:
          STAGING_URL: https://crew-predictions-staging.web.app
          STAGING_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}

      - name: Smoke test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Smoke Tests
          path: smoke-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-report
          path: smoke-report/
          retention-days: 5

  deploy-prod:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - run: npm ci

      # parents[1] is the develop tip on a standard merge commit.
      # Falls back to empty string on squash/rebase merges — image and zip resolution
      # will fall back to latest in that case.
      - name: Get develop SHA
        run: |
          SHA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.parents[1].sha // ""')
          echo "DEVELOP_SHA=$SHA" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Save prod-previous (rollback targets)
        run: |
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions
          gcloud artifacts docker tags add ${IMAGE}:prod ${IMAGE}:prod-previous --quiet || true
          gcloud storage cp gs://crew-predictions-frontend/prod.zip \
            gs://crew-predictions-frontend/prod-previous.zip || true

      - name: Resolve Docker image
        run: |
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions
          SHA="${{ env.DEVELOP_SHA }}"
          if [ -z "$SHA" ]; then
            echo "DEPLOY_IMAGE=${IMAGE}:latest" >> $GITHUB_ENV
            echo "::warning::DEVELOP_SHA empty (squash/rebase merge?) — falling back to :latest"
          # `tags list` only needs artifactregistry.tags.list (already granted).
          # `images describe` queries Container Analysis (containeranalysis.occurrences.list)
          # which the deploy SA doesn't have — and the perm denial surfaces as a misleading
          # "Image not found" error. Use tags list to avoid that trap.
          elif TAGS_OUT=$(gcloud artifacts docker tags list "${IMAGE}" --filter="tag:sha-${SHA}" --format="value(tag)" 2>&1) && echo "$TAGS_OUT" | grep -qx "sha-${SHA}"; then
            echo "DEPLOY_IMAGE=${IMAGE}:sha-${SHA}" >> $GITHUB_ENV
            echo "Deploying image sha-${SHA}"
          else
            echo "DEPLOY_IMAGE=${IMAGE}:latest" >> $GITHUB_ENV
            echo "::warning::sha-${SHA} not resolvable — falling back to :latest"
            echo "tags list output:"
            echo "$TAGS_OUT"
          fi

      - name: Resolve frontend zip
        run: |
          SHA="${{ env.DEVELOP_SHA }}"
          if [ -n "$SHA" ] && gcloud storage ls gs://crew-predictions-frontend/sha-${SHA}.zip 2>/dev/null; then
            gcloud storage cp gs://crew-predictions-frontend/sha-${SHA}.zip frontend.zip
            echo "FRONTEND_SOURCE=sha-${SHA}.zip" >> $GITHUB_ENV
            echo "Downloaded sha-${SHA}.zip"
          else
            gcloud storage cp gs://crew-predictions-frontend/latest.zip frontend.zip
            echo "FRONTEND_SOURCE=latest.zip" >> $GITHUB_ENV
            echo "::warning::sha-${SHA}.zip not found in GCS — falling back to latest.zip"
          fi
          unzip -q frontend.zip -d dist/

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east5-docker.pkg.dev --quiet

      - name: Deploy to prod Cloud Run
        run: |
          gcloud run deploy crew-predictions \
            --image=${{ env.DEPLOY_IMAGE }} \
            --region=us-east5 \
            --concurrency=80 \
            --cpu=1 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=20 \
            --timeout=300 \
            --cpu-boost \
            --set-env-vars=FIREBASE_PROJECT_ID=crew-predictions,FIREBASE_API_KEY=$PROD_API_KEY,FIREBASE_AUTH_DOMAIN=crew-predictions.web.app,GOOGLE_CLOUD_PROJECT=crew-predictions,FIREBASE_MEASUREMENT_ID=G-PFL8D07Q09,FIREBASE_APP_ID=1:937208344837:web:28d1ccfe9f2ac0a2dd876c,CLOUD_TASKS_PROJECT=crew-predictions,CLOUD_TASKS_LOCATION=us-east4,CLOUD_TASKS_QUEUE=match-polling,CLOUD_TASKS_TARGET_URL=https://crew-predictions-3qbonlobra-ul.a.run.app/admin/poll-scores \
            --update-secrets=ADMIN_KEY=admin-key:latest,SESSION_SECRET=session-secret:latest \
            --quiet
        env:
          PROD_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}

      - name: Deploy to Firebase Hosting
        run: npx firebase deploy --only hosting --project crew-predictions

      - name: Deploy Firestore rules + indexes to prod
        run: npx firebase deploy --only firestore --project crew-predictions

      - name: Promote prod tags
        run: |
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions
          gcloud artifacts docker tags add ${{ env.DEPLOY_IMAGE }} ${IMAGE}:prod --quiet
          gcloud storage cp frontend.zip gs://crew-predictions-frontend/prod.zip
          echo "prod promoted — image: ${{ env.DEPLOY_IMAGE }}, frontend: ${{ env.FRONTEND_SOURCE }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Deploy failed — rolling back to previous prod"
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions

          gcloud run deploy crew-predictions \
            --image=${IMAGE}:prod \
            --region=us-east5 \
            --update-secrets=ADMIN_KEY=admin-key:latest,SESSION_SECRET=session-secret:latest \
            --quiet \
            && echo "Cloud Run rolled back to prod image" \
            || echo "::error::Cloud Run rollback failed — manual intervention required"

          if gcloud storage ls gs://crew-predictions-frontend/prod-previous.zip 2>/dev/null; then
            gcloud storage cp gs://crew-predictions-frontend/prod-previous.zip rollback.zip
            rm -rf dist/ && unzip -q rollback.zip -d dist/
            npx firebase deploy --only hosting --project crew-predictions \
              && echo "Firebase Hosting rolled back to prod-previous" \
              || echo "::error::Firebase rollback failed — manual intervention required"
          else
            echo "::warning::No prod-previous.zip found — Firebase Hosting not rolled back (first deploy?)"
          fi

  smoke-prod:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: deploy-prod
    runs-on: ubuntu-latest
    # Same container approach as build-and-test — chromium + system libs
    # preinstalled. Image tag must match @playwright/test in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    permissions:
      checks: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - run: npm ci

      - name: Run prod smoke tests
        run: npm run test:smoke:prod
        env:
          PROD_URL: https://crew-predictions.web.app

      - name: Prod smoke test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Prod Smoke Tests
          path: prod-smoke-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: Upload prod smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-smoke-report
          path: prod-smoke-report/
          retention-days: 5
