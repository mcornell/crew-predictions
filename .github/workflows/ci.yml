name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      # Firebase Auth emulator requires Java 25 (latest LTS)
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      # Cache Firebase emulator binaries (Firestore jar is ~100MB)
      - uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - run: npm ci

      - name: Go unit tests
        run: go test ./...

      - name: Vue unit tests
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Firebase emulators
        run: npx firebase-tools@latest emulators:start --only auth,firestore --project crew-predictions &
        env:
          FIREBASE_PROJECT_ID: crew-predictions

      - name: Wait for Firebase emulators
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:9099; do sleep 1; done'
          timeout 30 bash -c 'until curl -sf http://localhost:8081; do sleep 1; done'

      - name: E2e tests
        run: npm test
        env:
          FIREBASE_PROJECT_ID: crew-predictions
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci && npm run build

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        run: gcloud run deploy crew-predictions --source . --region us-east5 --quiet

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project crew-predictions
