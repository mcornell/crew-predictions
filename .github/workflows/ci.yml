name: CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'

jobs:
  test:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      # Firebase Auth emulator requires Java 25 (latest LTS)
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      # Cache Firebase emulator binaries (Firestore jar is ~100MB)
      - uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - run: npm ci
      - run: go mod download

      - name: Go unit tests
        run: go test ./...

      - name: Vue unit tests
        run: npm run test:unit

      - name: TypeScript type check
        run: npm run typecheck

      # Cache Playwright browsers (Chromium bundle is ~170MB)
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start Firebase emulators
        run: npx firebase-tools@latest emulators:start --only auth,firestore --project crew-predictions &
        env:
          FIREBASE_PROJECT_ID: crew-predictions

      - name: Wait for Firebase emulators
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:9099; do sleep 1; done'
          timeout 30 bash -c 'until curl -sf http://localhost:8081; do sleep 1; done'

      - name: E2e tests
        run: npm test
        env:
          FIREBASE_PROJECT_ID: crew-predictions
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 3

  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east5-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker pull us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:latest || true
          docker build \
            --cache-from us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:latest \
            -t us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ github.sha }} \
            -t us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:latest \
            .
          docker push us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ github.sha }}
          docker push us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:latest

      - name: Deploy to staging Cloud Run
        run: |
          gcloud run deploy crew-predictions-staging \
            --image=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ github.sha }} \
            --project=crew-predictions-staging \
            --region=us-east5 \
            --allow-unauthenticated \
            --set-env-vars=FIREBASE_PROJECT_ID=crew-predictions-staging,FIREBASE_API_KEY=$STAGING_API_KEY,FIREBASE_AUTH_DOMAIN=crew-predictions-staging.web.app,GOOGLE_CLOUD_PROJECT=crew-predictions-staging \
            --quiet
        env:
          STAGING_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}

      - name: Smoke test staging
        run: |
          STAGING_URL=$(gcloud run services describe crew-predictions-staging --region=us-east5 --project=crew-predictions-staging --format='value(status.url)')
          curl -f "$STAGING_URL/"
          curl -f "$STAGING_URL/api/matches"

      - name: Extract frontend artifact from Docker image
        run: |
          docker create --name tmp us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ github.sha }}
          docker cp tmp:/app/dist ./dist
          docker rm tmp

      - name: Deploy staging to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project crew-predictions-staging --config firebase.staging.json

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ github.sha }}
          path: dist/
          retention-days: 90

  smoke-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run staging smoke tests
        run: npm run test:smoke
        env:
          STAGING_URL: https://crew-predictions-staging.web.app
          STAGING_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: smoke-report/
          retention-days: 5

  deploy-prod:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v6

      # parents[1] is the develop tip on a standard merge commit
      - name: Get develop SHA
        run: echo "DEVELOP_SHA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.parents[1].sha')" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy image to prod Cloud Run
        run: |
          gcloud run deploy crew-predictions \
            --image=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ env.DEVELOP_SHA }} \
            --region=us-east5 \
            --quiet

      - name: Find staging run ID
        run: echo "STAGING_RUN_ID=$(gh run list --workflow=ci.yml --branch=develop --event=push --commit=${{ env.DEVELOP_SHA }} --json=databaseId --jq='.[0].databaseId')" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-${{ env.DEVELOP_SHA }}
          run-id: ${{ env.STAGING_RUN_ID }}
          github-token: ${{ github.token }}
          path: dist/

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project crew-predictions

      - name: Smoke test prod
        run: |
          PROD_URL=$(gcloud run services describe crew-predictions --region=us-east5 --format='value(status.url)')
          curl -f "$PROD_URL/"
          curl -f "$PROD_URL/api/matches"
