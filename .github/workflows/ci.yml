name: CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/develop' }}

jobs:
  test:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      # Firebase Auth emulator requires Java 25 (latest LTS)
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      # Cache Firebase emulator binaries (Firestore jar is ~100MB)
      - uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - run: npm ci
      - run: go mod download
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum

      - name: Go unit tests
        run: |
          echo "## Go Tests" >> $GITHUB_STEP_SUMMARY
          gotestsum --junitfile go-results.xml -- -coverprofile=go-coverage.out ./...

      - name: Go test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Go Tests
          path: go-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: Go coverage summary
        if: always()
        run: |
          python3 -c "
          from collections import defaultdict
          covered, total = defaultdict(int), defaultdict(int)
          with open('go-coverage.out') as f:
              for line in f:
                  line = line.strip()
                  if line.startswith('mode:') or not line:
                      continue
                  loc, stmts, count = line.split()
                  pkg = loc.rsplit('/', 1)[0].replace('github.com/mcornell/crew-predictions/', '')
                  n = int(stmts)
                  total[pkg] += n
                  if int(count) > 0:
                      covered[pkg] += n
          ac, at = sum(covered.values()), sum(total.values())
          print('## Go Coverage')
          print('| Package | % | Covered / Total |')
          print('|---|---|---|')
          for pkg in sorted(total):
              c, t = covered[pkg], total[pkg]
              print(f'| \`{pkg}\` | {100*c/t:.1f}% | {c}/{t} |')
          print(f'| **total** | **{100*ac/at:.1f}%** | **{ac}/{at}** |')
          " >> $GITHUB_STEP_SUMMARY

      - name: Vue unit tests
        run: |
          echo "## Vue Tests" >> $GITHUB_STEP_SUMMARY
          npm run test:unit -- --coverage

      - name: Vue test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Vue Tests
          path: vitest-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: Vue coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            python3 -c "
          import json, sys
          d = json.load(open('coverage/coverage-summary.json'))['total']
          print('## Vue Coverage')
          print('| Metric | % | Covered / Total |')
          print('|---|---|---|')
          for k in ['statements', 'branches', 'functions', 'lines']:
              v = d[k]
              print(f'| {k.capitalize()} | {v[\"pct\"]}% | {v[\"covered\"]}/{v[\"total\"]} |')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: TypeScript type check
        run: npm run typecheck

      - name: Start Firebase emulators
        run: npx firebase emulators:start --only auth,firestore --project crew-predictions &
        env:
          FIREBASE_PROJECT_ID: crew-predictions

      # Cache Playwright browsers (Chromium bundle is ~170MB)
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for Firebase emulators
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:9099; do sleep 1; done'
          timeout 30 bash -c 'until curl -sf http://localhost:8081; do sleep 1; done'

      - name: Go integration tests
        run: |
          echo "## Go Integration Tests" >> $GITHUB_STEP_SUMMARY
          gotestsum --junitfile go-integration-results.xml -- -tags integration ./internal/repository/...
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8081
          FIREBASE_PROJECT_ID: crew-predictions

      - name: Go integration test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Go Integration Tests
          path: go-integration-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: E2e tests
        run: |
          echo "## Playwright E2E" >> $GITHUB_STEP_SUMMARY
          npm test
        env:
          FIREBASE_PROJECT_ID: crew-predictions
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

      - name: Playwright test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Playwright E2E Tests
          path: playwright-results.xml
          reporter: java-junit
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 3

  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: us-east5-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          load: true
          tags: |
            us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ github.sha }}
            us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging Cloud Run
        run: |
          gcloud run deploy crew-predictions-staging \
            --image=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ github.sha }} \
            --project=crew-predictions-staging \
            --region=us-east5 \
            --allow-unauthenticated \
            --set-env-vars=FIREBASE_PROJECT_ID=crew-predictions-staging,FIREBASE_API_KEY=$STAGING_API_KEY,FIREBASE_AUTH_DOMAIN=crew-predictions-staging.web.app,GOOGLE_CLOUD_PROJECT=crew-predictions-staging,FIREBASE_MEASUREMENT_ID=G-7N1MBBZ18B \
            --update-secrets=ADMIN_KEY=admin-key:latest,SESSION_SECRET=session-secret:latest \
            --quiet
        env:
          STAGING_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}

      - name: Extract frontend from Docker image
        run: |
          docker create --name tmp us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions:sha-${{ github.sha }}
          docker cp tmp:/app/dist ./dist
          docker rm tmp

      - name: Deploy staging to Firebase Hosting
        run: npx firebase deploy --only hosting --project crew-predictions-staging --config firebase.staging.json

      - name: Upload frontend to GCS
        run: |
          cd dist && zip -r ../frontend.zip .
          gcloud storage cp ../frontend.zip gs://crew-predictions-frontend/sha-${{ github.sha }}.zip
          gcloud storage cp ../frontend.zip gs://crew-predictions-frontend/latest.zip
          echo "Uploaded sha-${{ github.sha }}.zip and latest.zip to GCS"

  smoke-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run staging smoke tests
        run: npm run test:smoke
        env:
          STAGING_URL: https://crew-predictions-staging.web.app
          STAGING_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-report
          path: smoke-report/
          retention-days: 5

  deploy-prod:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      # parents[1] is the develop tip on a standard merge commit.
      # Falls back to empty string on squash/rebase merges — image and zip resolution
      # will fall back to latest in that case.
      - name: Get develop SHA
        run: |
          SHA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --jq '.parents[1].sha // ""')
          echo "DEVELOP_SHA=$SHA" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Save prod-previous (rollback targets)
        run: |
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions
          gcloud artifacts docker tags add ${IMAGE}:prod ${IMAGE}:prod-previous --quiet || true
          gcloud storage cp gs://crew-predictions-frontend/prod.zip \
            gs://crew-predictions-frontend/prod-previous.zip || true

      - name: Resolve Docker image
        run: |
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions
          SHA="${{ env.DEVELOP_SHA }}"
          if [ -n "$SHA" ] && gcloud artifacts docker images describe ${IMAGE}:sha-${SHA} --quiet 2>/dev/null; then
            echo "DEPLOY_IMAGE=${IMAGE}:sha-${SHA}" >> $GITHUB_ENV
            echo "Deploying image sha-${SHA}"
          else
            echo "DEPLOY_IMAGE=${IMAGE}:latest" >> $GITHUB_ENV
            echo "::warning::sha-${SHA} not found in Artifact Registry — falling back to latest"
          fi

      - name: Resolve frontend zip
        run: |
          SHA="${{ env.DEVELOP_SHA }}"
          if [ -n "$SHA" ] && gcloud storage ls gs://crew-predictions-frontend/sha-${SHA}.zip 2>/dev/null; then
            gcloud storage cp gs://crew-predictions-frontend/sha-${SHA}.zip frontend.zip
            echo "FRONTEND_SOURCE=sha-${SHA}.zip" >> $GITHUB_ENV
            echo "Downloaded sha-${SHA}.zip"
          else
            gcloud storage cp gs://crew-predictions-frontend/latest.zip frontend.zip
            echo "FRONTEND_SOURCE=latest.zip" >> $GITHUB_ENV
            echo "::warning::sha-${SHA}.zip not found in GCS — falling back to latest.zip"
          fi
          unzip -q frontend.zip -d dist/

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east5-docker.pkg.dev --quiet

      - name: Deploy to prod Cloud Run
        run: |
          gcloud run deploy crew-predictions \
            --image=${{ env.DEPLOY_IMAGE }} \
            --region=us-east5 \
            --set-env-vars=FIREBASE_MEASUREMENT_ID=G-PFL8D07Q09 \
            --update-secrets=ADMIN_KEY=admin-key:latest,SESSION_SECRET=session-secret:latest \
            --quiet

      - name: Deploy to Firebase Hosting
        run: npx firebase deploy --only hosting --project crew-predictions

      - name: Smoke test prod
        run: |
          PROD_URL=$(gcloud run services describe crew-predictions --region=us-east5 --format='value(status.url)')
          curl -f "$PROD_URL/"
          curl -f "$PROD_URL/api/matches"

      - name: Promote prod tags
        run: |
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions
          gcloud artifacts docker tags add ${{ env.DEPLOY_IMAGE }} ${IMAGE}:prod --quiet
          gcloud storage cp frontend.zip gs://crew-predictions-frontend/prod.zip
          echo "prod promoted — image: ${{ env.DEPLOY_IMAGE }}, frontend: ${{ env.FRONTEND_SOURCE }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Deploy failed — rolling back to previous prod"
          IMAGE=us-east5-docker.pkg.dev/crew-predictions/crew-predictions/crew-predictions

          gcloud run deploy crew-predictions \
            --image=${IMAGE}:prod \
            --region=us-east5 \
            --update-secrets=ADMIN_KEY=admin-key:latest,SESSION_SECRET=session-secret:latest \
            --quiet \
            && echo "Cloud Run rolled back to prod image" \
            || echo "::error::Cloud Run rollback failed — manual intervention required"

          if gcloud storage ls gs://crew-predictions-frontend/prod-previous.zip 2>/dev/null; then
            gcloud storage cp gs://crew-predictions-frontend/prod-previous.zip rollback.zip
            rm -rf dist/ && unzip -q rollback.zip -d dist/
            npx firebase deploy --only hosting --project crew-predictions \
              && echo "Firebase Hosting rolled back to prod-previous" \
              || echo "::error::Firebase rollback failed — manual intervention required"
          else
            echo "::warning::No prod-previous.zip found — Firebase Hosting not rolled back (first deploy?)"
          fi
